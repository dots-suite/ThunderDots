name: CI

on:
  push:
    branches:
      - main
      - master
      - "release/*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  python-lint:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        run: uv python install 3.11

      - name: Install deps
        run: uv sync

      - name: Ruff format (check)
        run: uv run ruff format --check thunderdots

      - name: Ruff lint
        run: uv run ruff check thunderdots

  go-build:
    name: Go native lib (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: thunderdots/native/go/go.sum

      # dossier build (et purge)
      - name: Prepare build dir (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p thunderdots/native/build
          rm -rf thunderdots/native/build/*

      - name: Prepare build dir (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force thunderdots/native/build | Out-Null
          Remove-Item -Recurse -Force thunderdots/native/build/* -ErrorAction SilentlyContinue

      # build linux/mac
      - name: Build (linux/mac)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: thunderdots/native/go
        run: |
          set -euo pipefail

          OUT="../build/libthunderdots.so"
          if [ "${{ runner.os }}" = "macOS" ]; then
            OUT="../build/libthunderdots.dylib"
          fi

          # build shared lib
          go build -buildmode=c-shared -o "$OUT" ./cmd/thunderdots

          echo "Built: $OUT"
          ls -la ../build

      # build windows
      - name: Build (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: thunderdots/native/go
        run: |
          # buildmode=c-shared => .dll + .h (et parfois .a)
          go build -buildmode=c-shared -o ..\build\thunderdots.dll .\cmd\thunderdots
          Get-ChildItem ..\build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thunderdots-native-${{ runner.os }}
          path: thunderdots/native/build/*
          if-no-files-found: error
