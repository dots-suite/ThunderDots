name: Release to PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  pypi-release:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/thunderdots/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Check release tag matches pyproject version
        run: |
          uv run python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          tag_version = tag[1:] if tag.startswith("v") else tag

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = pyproject["project"]["version"]

          if tag_version != project_version:
              raise SystemExit(
                  f"Release tag '{tag}' does not match pyproject.toml version "
                  f"'{project_version}'. Expected GitHub release tag: v{project_version}"
              )

          print(f"Version check OK: {tag} matches pyproject.toml version {project_version}")
          PY

      - name: Build package
        run: uv build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1